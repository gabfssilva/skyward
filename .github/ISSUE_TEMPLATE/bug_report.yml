name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Python version, Skyward version, OS, provider used."
      placeholder: |
        - Python: 3.13
        - Skyward: 0.5.0
        - OS: Ubuntu 24.04
        - Provider: AWS
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Paste any relevant error output.
      render: shell
    validations:
      required: false
