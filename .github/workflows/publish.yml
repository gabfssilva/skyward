name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - name: Install Task
        uses: Wandalen/wretry.action@v3
        with:
          action: arduino/setup-task@v2
          attempt_limit: 3
          attempt_delay: 10000
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: task build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
