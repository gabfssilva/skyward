version: "3"

vars:
  SRC: skyward
  TESTS: tests
  PYTHON_VERSION: "3.13"
  PYTHON_VERSIONS: "3.12 3.13 3.14"
  BASE_IMAGE: "ghcr.io/gabfssilva/skyward"
  PLATFORM: '{{.PLATFORM | default ""}}'

tasks:
  # ── Quality ──────────────────────────────────────────────

  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check {{.SRC}}/ {{.TESTS}}/

  lint:fix:
    desc: Auto-fix lint issues
    cmds:
      - uv run ruff check --fix {{.SRC}}/ {{.TESTS}}/

  typecheck:
    desc: Run pyright type checker
    cmds:
      - uv run pyright {{.SRC}}/

  typecheck:fix:
    desc: Run pyright type checker
    cmds:
      - uv run pyright --fix {{.SRC}}/

  check:
    desc: Run lint + typecheck
    cmds:
      - task: lint
      - task: typecheck

  # ── Testing ──────────────────────────────────────────────

  test:
    desc: Run unit tests (default, parallel)
    cmds:
      - uv run pytest {{.CLI_ARGS}}

  test:unit:
    desc: Run unit tests only
    cmds:
      - uv run pytest -m unit {{.CLI_ARGS}}

  test:e2e:
    desc: Run all e2e tests (requires Docker)
    cmds:
      - uv run pytest -m e2e {{.CLI_ARGS}}

  test:e2e:pool:
    desc: "E2E: compute, broadcast, runtime, output control, async, parallel, streaming"
    cmds:
      - uv run pytest -m e2e -k "not (Integration or distributed or image or provision_retry or node_recovery or plugins)" {{.CLI_ARGS}}

  test:e2e:distributed:
    desc: "E2E: distributed collections (dict, set, counter, queue, barrier, lock)"
    cmds:
      - uv run pytest tests/test_distributed.py {{.CLI_ARGS}}

  test:e2e:image:
    desc: "E2E: image and bootstrap validation"
    cmds:
      - uv run pytest tests/test_image.py {{.CLI_ARGS}}

  test:e2e:torch:
    desc: "E2E: PyTorch distributed training plugin"
    cmds:
      - uv run pytest tests/plugins/test_torch.py {{.CLI_ARGS}}

  test:e2e:jax:
    desc: "E2E: JAX distributed plugin"
    cmds:
      - uv run pytest tests/plugins/test_jax.py {{.CLI_ARGS}}

  test:e2e:keras:
    desc: "E2E: Keras plugin"
    cmds:
      - uv run pytest tests/plugins/test_keras.py {{.CLI_ARGS}}

  test:e2e:joblib:
    desc: "E2E: Joblib parallel backend plugin"
    cmds:
      - uv run pytest tests/plugins/test_joblib.py {{.CLI_ARGS}}

  test:sanity:
    desc: Run sanity tests against real cloud providers
    cmds:
      - uv run pytest -m sanity {{.CLI_ARGS}}

  test:sanity:aws:
    desc: Run AWS sanity tests
    cmds:
      - uv run pytest -m "sanity and aws" {{.CLI_ARGS}}

  test:sanity:gcp:
    desc: Run GCP sanity tests
    cmds:
      - uv run pytest -m "sanity and gcp" {{.CLI_ARGS}}

  test:sanity:runpod:
    desc: Run RunPod sanity tests
    cmds:
      - uv run pytest -m "sanity and runpod" {{.CLI_ARGS}}

  test:sanity:vastai:
    desc: Run VastAI sanity tests
    cmds:
      - uv run pytest -m "sanity and vastai" {{.CLI_ARGS}}

  test:sanity:verda:
    desc: Run Verda sanity tests
    cmds:
      - uv run pytest -m "sanity and verda" {{.CLI_ARGS}}

  test:sanity:hyperstack:
    desc: Run Hyperstack sanity tests
    cmds:
      - uv run pytest -m "sanity and hyperstack" {{.CLI_ARGS}}

  test:sanity:tensordock:
    desc: Run TensorDock sanity tests
    cmds:
      - uv run pytest -m "sanity and tensordock" {{.CLI_ARGS}}

  test:sanity:vultr:
    desc: Run Vultr sanity tests
    cmds:
      - uv run pytest -m "sanity and vultr" {{.CLI_ARGS}}

  test:all:
    desc: Run unit + e2e tests
    cmds:
      - uv run pytest -m "unit or e2e" {{.CLI_ARGS}}

  test:offers:
    desc: "Offer catalog unit tests"
    cmds:
      - uv run pytest tests/offers/ -v -m "not integration" {{.CLI_ARGS}}

  test:offers:integration:
    desc: "Offer catalog integration tests (real API calls)"
    cmds:
      - uv run pytest tests/offers/ -v -m integration {{.CLI_ARGS}}

  # ── Docs ─────────────────────────────────────────────────

  docs:
    desc: Serve docs locally
    cmds:
      - uv run mkdocs serve

  docs:build:
    desc: Build static docs site
    cmds:
      - uv run mkdocs build

  docs:deploy:
    desc: Deploy docs to GitHub Pages
    cmds:
      - uv run mkdocs gh-deploy --force

  # ── Docker ───────────────────────────────────────────────

  docker:build:
    desc: Build base image for one Python version (default 3.13)
    cmds:
      - docker build -f docker/Dockerfile.base {{if .PLATFORM}}--platform {{.PLATFORM}}{{end}} --build-arg PYTHON_VERSION={{.PYTHON_VERSION}} -t {{.BASE_IMAGE}}:py{{.PYTHON_VERSION}} docker/

  docker:build:all:
    desc: Build base images for Python 3.12, 3.13, and 3.14
    cmds:
      - for:
          var: PYTHON_VERSIONS
        cmd: docker build -f docker/Dockerfile.base {{if .PLATFORM}}--platform {{.PLATFORM}}{{end}} --build-arg PYTHON_VERSION={{.ITEM}} -t {{.BASE_IMAGE}}:py{{.ITEM}} docker/

  docker:push:
    desc: Push base image for one Python version (default 3.13)
    cmds:
      - docker push {{.BASE_IMAGE}}:py{{.PYTHON_VERSION}}

  docker:push:all:
    desc: Push base images for Python 3.12, 3.13, and 3.14
    cmds:
      - for:
          var: PYTHON_VERSIONS
        cmd: docker push {{.BASE_IMAGE}}:py{{.ITEM}}

  docker:release:
    desc: Build + push base images for all Python versions
    cmds:
      - task: docker:build:all
      - task: docker:push:all

  docker:pull:
    desc: Pull pre-built base image from GHCR
    cmds:
      - docker pull {{if .PLATFORM}}--platform {{.PLATFORM}} {{end}}{{.BASE_IMAGE}}:py{{.PYTHON_VERSION}}

  docker:clean:
    desc: Remove all skyward Docker images (base + prebaked)
    cmds:
      - docker images --format '{{"{{"}}.Repository{{"}}"}}:{{"{{"}}.Tag{{"}}"}}' | grep 'ghcr.io/gabfssilva/skyward:' | xargs -r docker rmi 2>/dev/null || true

  # ── Catalog ──────────────────────────────────────────────

  catalog:
    desc: Refresh GPU offer catalog cache
    cmds:
      - uv run python -c "import asyncio; from skyward.offers.feed import refresh; asyncio.run(refresh())"

  # ── Build ────────────────────────────────────────────────

  build:
    desc: Build wheel + sdist
    cmds:
      - uv build

  # ── Dev ──────────────────────────────────────────────────

  setup:
    desc: Install all dev dependencies
    cmds:
      - uv sync --dev

  setup:docs:
    desc: Install docs dependencies only
    cmds:
      - uv sync --group docs

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - rm -rf dist/ site/ .pytest_cache/ .ruff_cache/
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      - find . -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true

  # ── Demo ────────────────────────────────────────────────

  demo:
    desc: "Record demo video, speedup provisioning, and downscale to 1080p"
    dir: demo
    vars:
      CUT_START: '{{.CUT_START | default "20"}}'
      CUT_END: '{{.CUT_END | default "15"}}'
      SPEED: '{{.SPEED | default "10"}}'
    cmds:
      - vhs test.tape
      - |
        DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 test.mp4 | cut -d. -f1)
        TAIL_START=$((DURATION - {{.CUT_END}}))
        PTS=$(awk "BEGIN{printf \"%.4f\", 1/{{.SPEED}}}")
        echo "test.mp4 (${DURATION}s) → 0-{{.CUT_START}}s normal | {{.CUT_START}}-${TAIL_START}s {{.SPEED}}x | ${TAIL_START}-${DURATION}s normal"
        ffmpeg -y -i test.mp4 -filter_complex \
          "[0:v]trim=0:{{.CUT_START}},setpts=PTS-STARTPTS[v1]; \
           [0:v]trim={{.CUT_START}}:${TAIL_START},setpts=${PTS}*(PTS-STARTPTS)[v2]; \
           [0:v]trim=${TAIL_START},setpts=PTS-STARTPTS[v3]; \
           [v1][v2][v3]concat=n=3:v=1:a=0,scale=1920:1080:flags=lanczos[out]" \
          -map "[out]" demo.mp4 2>/dev/null
        ffmpeg -y -i demo.mp4 -filter_complex "[0:v]split[a][b];[a]palettegen=max_colors=256:stats_mode=diff[p];[b][p]paletteuse=dither=floyd_steinberg" demo.gif 2>/dev/null
        echo "Done: demo.mp4 + demo.gif"
